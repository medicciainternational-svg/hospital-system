<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mediccia Hospital System</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7}

header{
  background:#0077cc;
  color:white;
  text-align:center;
  padding:15px;
}

.container{padding:15px}

.card{
  background:white;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,select,button{
  width:100%;
  padding:10px;
  margin-top:10px;
}

button{
  background:#0077cc;
  color:white;
  border:none;
  cursor:pointer;
}

.hidden{display:none}

.delete{background:red}
.print{background:green}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="container">
  <div class="card">
    <h2>Hospital Login</h2>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>
</div>

<!-- SYSTEM -->
<div id="system" class="hidden">

<header>
  <h2>Mediccia Hospital Dashboard</h2>
  <p id="roleText"></p>
</header>

<div class="container">

<!-- PASSWORD CHANGE -->
<div class="card">
<h3>Change Password</h3>
<input id="newpass" placeholder="New Password">
<button onclick="changePass()">Change</button>
</div>

<!-- RECEPTION -->
<div class="card" id="receptionBox">
<h3>Reception - Sajili Mgonjwa</h3>

<input id="name" placeholder="Jina la mgonjwa">
<input id="age" type="number" placeholder="Umri">

<select id="service">
  <option>Vipimo</option>
  <option>Dawa</option>
  <option>Full Body Checkup</option>
</select>

<input id="pay" type="number" placeholder="Kiasi kilicholipwa">

<button onclick="save()">Sajili</button>
</div>

<!-- RECORDS -->
<div class="card">
<h3>Hospital Records</h3>
<ul id="list"></ul>
</div>

</div>
</div>

<script>

let role="";
let data=[];

// LOGIN
function login(){

  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u==="Mediccia666" && p==="m@666"){
    role="admin";
    enter();
  }
  else if(p==="2026"){
    role="doctor";
    enter();
  }
  else if(p==="2025@"){
    role="reception";
    enter();
  }
  else{
    alert("Login imekataa");
  }
}

function enter(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("system").classList.remove("hidden");
  document.getElementById("roleText").innerText="Role: "+role;

  if(role==="doctor"){
    document.getElementById("receptionBox").style.display="none";
  }

  show();
}

// SAVE PATIENT
function save(){

  if(role!=="reception"){
    alert("Huna ruhusa");
    return;
  }

  let n=document.getElementById("name").value;
  let a=document.getElementById("age").value;
  let s=document.getElementById("service").value;
  let p=document.getElementById("pay").value;

  data.push({
    name:n,
    age:a,
    service:s,
    payment:p
  });

  show();
}

// SHOW RECORDS
function show(){

  let list=document.getElementById("list");
  list.innerHTML="";

  data.forEach((d,i)=>{

    list.innerHTML+=`
      <li>
        <b>${d.name}</b> | Umri: ${d.age} |
        Huduma: ${d.service} |
        💰 ${d.payment}

        ${role==="admin"?`<button class="delete" onclick="del(${i})">Futa</button>`:""}

        <button class="print" onclick="printInvoice(${i})">Invoice</button>
      </li>
    `;
  });
}

// DELETE (ADMIN ONLY)
function del(i){
  if(role!=="admin") return;
  data.splice(i,1);
  show();
}

// INVOICE PRINT
function printInvoice(i){
  let d=data[i];

  let w=window.open("");
  w.document.write(`
    <h2>Hospital Invoice</h2>
    <hr>
    <p>Jina: ${d.name}</p>
    <p>Umri: ${d.age}</p>
    <p>Huduma: ${d.service}</p>
    <p>Kiasi: ${d.payment}</p>
    <hr>
    <p>Asante kwa huduma</p>
  `);
  w.print();
}

// PASSWORD CHANGE (simple session)
function changePass(){
  let np=document.getElementById("newpass").value;
  alert("Password imebadilishwa (session): " + np);
}

</script>

</body>
</html>
